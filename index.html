<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js"></script>
</head>

<body>
    <main>
        <header>
            <h1>Jogo de Adivinhação</h1>
            <p>Jogo de adivinhação onde o jogador tenta descobrir um número secreto entre 1 e 100. A cada erro, o sistema informa se o número correto é maior ou menor e reduz o total de tentativas. O jogo termina quando o jogador acerta ou quando as dez tentativas acabam.</p>
        </header>

        <section>
            <div class="div1">
                <p> <input type="button" value="Gerar Numero" onclick="gerarNum()" id="gerarN"> </p> 
                <p id="res1"></p>
                <input type="number" id="caixaNum" placeholder="Digite o numero" class="numero">
                <input type="button" value="Chutar" id="button" onclick="chutar()" class="chutar">
            </div>
            <div class="div2">
                <p id="res"> 🎮 </p>
                <p id="chances"> ❤️ = 5</p>
            </div>
        </section>
    </main>
</body>

</html>
